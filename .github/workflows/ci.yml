name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Vicount
        uses: actions/checkout@v4

      - name: Clone vico-desktop-client dependency
        run: |
          cd "${{ github.workspace }}/.."
          git clone --depth 1 https://github.com/scotia/scotia.git vico-desktop-client

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run fmt/clippy/test/release
        run: |
          cd "${{ github.workspace }}"
          ./scripts/build-release.sh
